<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chai aur Code — Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <header class="stall-header">
    <div class="cup" aria-hidden="true">
      <span class="steam steam-1"></span>
      <span class="steam steam-2"></span>
      <span class="steam steam-3"></span>
      <div class="cup-body"></div>
    </div>
    <div class="header-text">
      <h1>Chai aur Code</h1>
      <p>aapka coding tutor · poochiye kuch bhi</p>
    </div>
  </header>

  <main class="chat-log" id="chatLog" role="log" aria-live="polite" aria-label="Conversation">

    <div class="msg msg-bot">
      <div class="avatar" aria-hidden="true"></div>
      <div class="bubble">
        Haan ji, swagat hai! Chai taiyar rakhiye — jo bhi coding sawaal hai, poochiye. Shuru karte hain.
      </div>
    </div>

  </main>

  <form class="composer" id="composerForm">
    <label for="messageInput" class="sr-only">Type your question</label>
    <input
      type="text"
      id="messageInput"
      name="message"
      placeholder="Apna sawaal likhiye… jaise 'for loop kaise likhte hain?'"
      autocomplete="off"
    >
    <button type="submit" aria-label="Send message">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
        <path d="M4 12L20 4L14 20L11 13L4 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
    </button>
  </form>

</div>

<script src="script.js"></script>
</body>
</html>
